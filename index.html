<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FGH Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@9..96,200..800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Bricolage Grotesque', sans-serif; text-align: center; padding-top: 45vh; margin: 0; }
        .loader { border: 4px solid #222; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>𝖢𝗈𝗇𝗇𝖾𝖼𝗍𝗂𝗇𝗀 𝗍𝗈 𝖥𝖦𝖧...</h2>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        tg.requestContact((shared) => {
            if (shared) {
                // IMPORTANT: We close the app instead of redirecting
                // This lets the bot send the next message in the chat
                tg.close(); 
            } else {
                tg.close();
            }
        });
    </script>
</body>
</html>
