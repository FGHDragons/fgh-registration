<!DOCTYPE html>
<html>
<head>
    <title>FGH Registration</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>𝚁𝚎𝚍𝚒𝚛𝚎𝚌𝚝𝚒𝚗𝚐 𝚝𝚘 𝙵𝙶𝙷...</h2>
    <div class="loader"></div>
    <p>Please authorize to continue to the game.</p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Opens the app full screen

        // Trigger the professional Agree & Continue screen
        tg.requestContact((ok) => {
            if (ok) {
                // Once they click "Share", redirect to the main game
                window.location.href = "https://fgh.fun/";
            } else {
                tg.close(); // Close if they refuse
            }
        });
    </script>
</body>
</html>
